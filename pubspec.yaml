name: society_guardian
description: "A modern Residential Society Management App with automated visitor tracking and real-time notifications."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  firebase_app_check: ^0.3.1+2
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  
  # Routing
  go_router: ^14.2.7
  
  # Local Storage & Offline
  hive_flutter: ^1.1.0
  isar_flutter_libs: ^4.0.0-dev.13
  
  # Security & Biometrics
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  
  # Camera & Scanning
  mobile_scanner: ^6.0.2
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # UI/UX
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.1.2
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  dartz: ^0.10.1
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.1.2
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  image_cropper: ^8.0.2
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
