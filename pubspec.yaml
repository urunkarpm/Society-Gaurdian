name: society_guardian
description: A modern Residential Society Management App with Flutter + Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.9
  firebase_storage: ^11.6.0
  firebase_app_check: ^0.2.1+8
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.18
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Routing
  go_router: ^13.0.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Camera & Scanning
  mobile_scanner: ^3.5.5
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^4.0.0
  
  # Local Storage
  hive_flutter: ^1.1.0
  isar_flutter_libs: ^4.0.0-dev.13
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Notifications
  flutter_local_notifications: ^21.0.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  permission_handler: ^11.2.0
  geolocator: ^10.1.0
  local_auth: ^2.1.8
  
  # Forms & Validation
  form_validator: ^2.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  custom_lint: ^0.5.8
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
